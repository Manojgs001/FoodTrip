{% extends 'delivery/base.html' %}

{% block content %}
<div class="auth-container">
    <h2 class="text-center text-primary" style="margin-bottom: 2rem;">Sign In</h2>
    
    <form action="{% url 'signin' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">SIGN IN</button>
    </form>
    
    <p class="text-center text-muted" style="margin-top: 1.5rem;">
        Don't have an account? <a href="{% url 'open_signup' %}" class="text-primary" style="font-weight: 600;">Sign up</a>
    </p>
</div>
{% endblock %}
