{% extends 'delivery/base.html' %}

{% block title %}Login Failed - FoodTrip{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem;">
    <div style="background: var(--surface); border-radius: var(--radius-lg); padding: 3rem 4rem; box-shadow: var(--shadow-lg); max-width: 480px; width: 100%;">
        <div style="width: 80px; height: 80px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i class="fa-solid fa-circle-xmark" style="font-size: 2.5rem; color: #dc2626;"></i>
        </div>
        <h1 style="font-size: 1.75rem; font-weight: 700; color: #dc2626; margin-bottom: 0.75rem;">Login Failed</h1>
        <p class="text-muted" style="font-size: 1.05rem; margin-bottom: 2rem; line-height: 1.6;">
            The username or password you entered is incorrect.<br>Please try again.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{% url 'open_signin' %}" class="btn btn-primary" style="padding: 0.75rem 2rem;">
                <i class="fa-solid fa-arrow-left"></i> Try Again
            </a>
            <a href="{% url 'open_signup' %}" class="btn btn-outline" style="padding: 0.75rem 2rem;">
                Create Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
