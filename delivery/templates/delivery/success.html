{% extends 'delivery/base.html' %}

{% block title %}Welcome - FoodTrip{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem;">
    <div style="background: var(--surface); border-radius: var(--radius-lg); padding: 3rem 4rem; box-shadow: var(--shadow-lg); max-width: 480px; width: 100%;">
        <div style="width: 80px; height: 80px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i class="fa-solid fa-circle-check" style="font-size: 2.5rem; color: #16a34a;"></i>
        </div>
        <h1 style="font-size: 1.75rem; font-weight: 700; color: #16a34a; margin-bottom: 0.75rem;">Login Successful!</h1>
        <p class="text-muted" style="font-size: 1.05rem; margin-bottom: 2rem; line-height: 1.6;">
            Welcome back to FoodTrip! 🍕<br>Discover amazing restaurants near you.
        </p>
        <a href="{% url 'open_signin' %}" class="btn btn-primary" style="padding: 0.75rem 2rem;">
            <i class="fa-solid fa-store"></i> Browse Restaurants
        </a>
    </div>
</div>
{% endblock %}
