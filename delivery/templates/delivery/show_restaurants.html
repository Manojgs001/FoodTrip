{% extends 'delivery/base.html' %}

{% block title %}Manage Restaurants - Admin{% endblock %}

{% block content %}
<div class="header-section" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
    <div>
        <h2 class="text-primary">Manage Restaurants</h2>
        <p class="text-muted">Admin operations</p>
    </div>
    <a href="{% url 'open_add_restaurant' %}" class="btn btn-primary-sm"><i class="fa-solid fa-plus"></i> Add New</a>
</div>

<div class="grid-container">
    {% for r in restaurantList %}
    <div class="card">
        <img src="{% if r.picture %}{{ r.get_picture_url }}{% else %}https://placehold.co/400x250/f97316/white?text={{ r.name|urlencode }}{% endif %}" alt="{{ r.name }}" class="card-img">
        <div class="card-body">
            <h3 class="card-title">{{ r.name }}</h3>
            <p class="card-subtitle">{{ r.cuisine }}</p>
            <span class="badge badge-rating" style="margin-bottom: 1rem;"><i class="fa-solid fa-star"></i> {{ r.rating }}</span>
            
            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto;">
                <a href="{% url 'open_update_restaurant' r.id %}" class="btn btn-outline-sm text-center">
                    <i class="fa-solid fa-pen-to-square"></i> Edit Info
                </a>
                <a href="{% url 'open_update_menu' r.id %}" class="btn btn-outline-sm text-center">
                    <i class="fa-solid fa-utensils"></i> Manage Menu
                </a>
                <a href="{% url 'delete_restaurant' r.id %}" class="btn btn-danger text-center" onclick="return confirm('Are you sure you want to delete this restaurant?');">
                    <i class="fa-solid fa-trash"></i> Delete
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
