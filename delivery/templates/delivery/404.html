{% extends 'delivery/base.html' %}

{% block title %}Page Not Found - FoodTrip{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem;">
    <div style="font-size: 6rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite;">🍕</div>
    <h1 style="font-size: 6rem; font-weight: 700; color: var(--primary); line-height: 1; margin-bottom: 0.5rem;">404</h1>
    <h2 style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--gray-700);">Oops! This page went missing.</h2>
    <p class="text-muted" style="font-size: 1.1rem; max-width: 400px; margin-bottom: 2rem;">
        Looks like the page you're looking for was eaten by a hungry developer. 🍴
    </p>
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
        <a href="/" class="btn btn-primary" style="padding: 0.75rem 2rem;">
            <i class="fa-solid fa-house"></i> Go Home
        </a>
        <a href="javascript:history.back()" class="btn btn-outline" style="padding: 0.75rem 2rem;">
            <i class="fa-solid fa-arrow-left"></i> Go Back
        </a>
    </div>
</div>
<style>
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-15px); }
}
</style>
{% endblock %}
